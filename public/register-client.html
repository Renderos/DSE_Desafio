<form id="formCliente" class="space-y-3">
  <input class="border p-2 w-full" placeholder="Nombre" id="nombre">
  <input class="border p-2 w-full" placeholder="Email" id="email">
  <input class="border p-2 w-full" placeholder="Teléfono" id="telefono">
  <button class="bg-blue-500 text-white p-2 rounded">Guardar</button>
</form>

<script>
document.getElementById("formCliente").onsubmit = async (e) => {
  e.preventDefault();
  const res = await fetch("/clientes", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nombre: nombre.value,
      email: email.value,
      telefono: telefono.value
    })
  });
  const data = await res.json();
  alert("Cliente registrado con ID: " + data.id);
};
</script>
