<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Consultar Estado</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100">

<header class="border-b border-white/10 bg-slate-950/60 backdrop-blur">
  <div class="mx-auto max-w-3xl px-4 py-4 flex items-center justify-between">
    <a href="index.html" class="text-sm text-slate-300 hover:text-white">← Volver</a>
    <h1 class="text-base font-semibold">Consultar Estado</h1>
    <span class="text-xs text-slate-500">/solicitudes/:id</span>
  </div>
</header>

<main class="mx-auto max-w-3xl px-4 py-10">

<section class="rounded-3xl bg-white/5 p-8 ring-1 ring-white/10 shadow-xl">

<p class="text-sm text-slate-300">
Ingresa el ID de la solicitud para ver su detalle.
</p>

<div class="mt-6 flex flex-col gap-3 sm:flex-row">

<input
id="idSolicitud"
placeholder="Ej. 10"
inputmode="numeric"
class="w-full rounded-xl bg-slate-950/40 border border-white/10 px-4 py-3 text-sm outline-none
focus:ring-2 focus:ring-fuchsia-500/60"
/>

<button
onclick="consultar()"
class="inline-flex items-center justify-center rounded-xl bg-fuchsia-500 px-5 py-3 text-sm font-semibold text-white
hover:bg-fuchsia-400 active:bg-fuchsia-600 transition">
Consultar
</button>

</div>

<div id="resultado" class="mt-6"></div>

</section>

</main>

<script>

async function consultar() {

const box = document.getElementById("resultado");

const id = (idSolicitud.value || "").trim();

/* VALIDACIONES */

if (!id) {
box.innerHTML = `
<div class="rounded-2xl bg-amber-500/10 p-5 ring-1 ring-amber-500/30 text-sm text-amber-200">
Por favor ingresa un ID de solicitud.
</div>
`;
return;
}

if (isNaN(id)) {
box.innerHTML = `
<div class="rounded-2xl bg-amber-500/10 p-5 ring-1 ring-amber-500/30 text-sm text-amber-200">
El ID debe ser un número válido.
</div>
`;
return;
}

if (Number(id) <= 0) {
box.innerHTML = `
<div class="rounded-2xl bg-amber-500/10 p-5 ring-1 ring-amber-500/30 text-sm text-amber-200">
El ID debe ser mayor que 0.
</div>
`;
return;
}

/* BUSQUEDA */

box.innerHTML = `
<div class="rounded-2xl bg-white/5 p-4 ring-1 ring-white/10 text-sm text-slate-300">
Buscando...
</div>
`;

try {

const res = await fetch("/solicitudes/" + id);

const data = await res.json();

if (!res.ok || !data || (!data.estado && !data.descripcion)) {

box.innerHTML = `
<div class="rounded-2xl bg-rose-500/10 p-5 ring-1 ring-rose-500/30 text-sm text-rose-200">
No se encontró la solicitud. Verificá el ID e intentá nuevamente.
</div>
`;

return;

}

const estadoTxt = (data.estado ?? "N/A");

const estado = String(estadoTxt).toLowerCase();

let badge = "bg-white/10 text-slate-100 ring-white/15";

if (estado.includes("pend")) badge = "bg-amber-500/15 text-amber-200 ring-amber-500/30";

if (estado.includes("res")) badge = "bg-emerald-500/15 text-emerald-200 ring-emerald-500/30";

box.innerHTML = `
<div class="rounded-2xl bg-white/5 p-5 ring-1 ring-white/10">

<p class="text-xs text-slate-400">Resultado</p>

<div class="mt-3 space-y-2 text-sm">

<p>
<span class="text-slate-300">Descripción:</span>
<span class="text-slate-100 font-medium">${data.descripcion ?? "N/A"}</span>
</p>

<p class="flex items-center gap-2">
<span class="text-slate-300">Estado:</span>

<span class="inline-flex items-center rounded-full px-3 py-1 text-xs ring-1 ${badge}">
${estadoTxt}
</span>

</p>

</div>

</div>
`;

} catch (err) {

box.innerHTML = `
<div class="rounded-2xl bg-rose-500/10 p-5 ring-1 ring-rose-500/30 text-sm text-rose-200">
Error de conexión con el servidor. Asegurate que el server esté corriendo en localhost:3000.
</div>
`;

}

}

</script>

</body>
</html>
